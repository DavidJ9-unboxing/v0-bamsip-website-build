<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="weave-top">
      <circle cx="32" cy="19.4" r="7" />
    </clipPath>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0A0A0F" />
  <!-- left link (cream) -->
  <circle cx="26" cy="32" r="14" stroke="#FFFFFF" stroke-width="5" />
  <!-- right link (flame) sits over the left at the bottom crossing -->
  <circle cx="38" cy="32" r="14" stroke="#FF6B54" stroke-width="5" />
  <!-- redraw the left link at the top crossing so cream weaves over -->
  <circle cx="26" cy="32" r="14" stroke="#FFFFFF" stroke-width="5" clip-path="url(#weave-top)" />
</svg>
